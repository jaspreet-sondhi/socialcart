
{% extends "layout.html" %}

{% block title %}
chai shop
{% endblock  %}

{% block content %}

<h1 class="text-center mt-4">Welcome to my shop</h1>

<h2>{%if form.instance.pk  %}
    Edit shop
    {% else %}
    Create shop
    {% endif %}
    <form method="post" enctype="multipart/form-data" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-warning" type="submit">Submit</button>
    </form>
    <a href="{% url 'shops_list' %}">Back to shop list</a>
</h2>

{% endblock %}
