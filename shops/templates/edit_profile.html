{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success" type="submit">
            Save Profile
        </button>

    </form>

</div>

{% endblock %}
